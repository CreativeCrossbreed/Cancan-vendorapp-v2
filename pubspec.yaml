name: cancan_vendor
description: Can Can Vendor App - Water can delivery management for vendors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (Backend)
  supabase_flutter: ^2.12.0

  # State Management
  provider: ^6.1.2

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.10+1

  # Date & Time
  intl: ^0.20.2

  # Phone Authentication
  pinput: ^6.0.1  # OTP input field

  # QR Code
  qr_flutter: ^4.1.0

  # URL Launcher (WhatsApp, Phone calls)
  url_launcher: ^6.3.1

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Push Notifications
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^19.5.0

  # Permissions
  permission_handler: ^12.0.1

  # Environment Variables
  flutter_dotenv: ^6.0.0

  # Loading & Alerts
  flutter_spinkit: ^5.2.1

  # Utilities
  shared_preferences: ^2.5.4  # Local storage
  uuid: ^4.5.1  # Generate UUIDs
  logger: ^2.5.0  # Logging utility

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: false  # We'll add iOS later
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#5B8DEF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - .env

  # Fonts (using Google Fonts, no need to bundle)